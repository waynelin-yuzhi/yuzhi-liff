<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex,nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<link rel="stylesheet" href="https://use.typekit.net/svy7tqc.css">
<title>植間 Reels 微調台</title>
<style>
  :root{--moss:#5F6E58;--paper:#F2EDE3;--ink:#1B1A17;--muted:#8a8275;--body:#4A4A45;--line:#E5E0D3}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--paper);color:var(--ink);font-family:"shippori-mincho","Songti TC",serif;
       padding:16px;max-width:640px;margin:0 auto}
  header{border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
  h1{font-size:20px;letter-spacing:.06em;font-weight:700}
  .sub{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);letter-spacing:.18em;margin-top:6px}

  .load{border:1px dashed var(--line);background:#fff;padding:12px;border-radius:2px;margin-bottom:14px}
  .load label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.06em}
  .load input{width:100%;font-size:13px}

  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .tab{flex:1;min-width:52px;padding:9px 4px;text-align:center;cursor:pointer;border:1px solid var(--line);
       background:#fff;font-size:13px;color:var(--body);border-radius:2px}
  .tab.on{background:var(--moss);color:var(--paper);border-color:var(--moss)}

  .stage{position:relative;width:100%;aspect-ratio:9/16;background:#000;border:1px solid var(--line);
         overflow:hidden;border-radius:2px;touch-action:none;user-select:none}
  .stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
         color:#6b6b66;font-size:13px;text-align:center;padding:24px;line-height:1.8}
  .capbox{position:absolute;left:50%;transform:translate(-50%,-50%);width:92%;text-align:center;
          text-shadow:0 2px 6px rgba(0,0,0,.9),0 4px 18px rgba(0,0,0,.75);padding:8px 0;display:none}
  .capbox.show{display:block}
  .capbox.editing{cursor:grab;outline:1px dashed rgba(255,255,255,.45);outline-offset:6px}
  .capbox .zh{font-family:"Songti TC",serif;color:#fff;font-size:min(5.2vw,30px);letter-spacing:.08em;line-height:1.35}
  .capbox .en{color:#fff;font-family:ui-sans-serif,system-ui,sans-serif;font-size:min(2.9vw,17px);
              letter-spacing:.06em;margin-top:7px}

  .bar{display:flex;align-items:center;gap:10px;margin:10px 0 4px}
  .play{width:52px;padding:9px 0;background:var(--moss);color:var(--paper);border:none;border-radius:2px;
        font-family:inherit;font-size:13px;cursor:pointer}
  .undo{width:auto;padding:9px 14px;background:#fff;color:var(--moss);border:1px solid var(--moss)}
  .undo:disabled{color:var(--muted);border-color:var(--line);cursor:default}
  .plab{font-size:12px;color:var(--muted);letter-spacing:.08em}
  .pos{flex:1;padding:9px 4px;background:#fff;color:var(--moss);border:1px solid var(--moss);
       border-radius:2px;font-family:inherit;font-size:12px;cursor:pointer}
  .pos.on{background:var(--moss);color:var(--paper)}
  .zone{border-color:var(--muted);color:var(--muted)}
  .zone.on{background:var(--muted);color:#fff;border-color:var(--muted)}
  /* IG UI 遮擋區示意（不進成品、只在面板顯示） */
  .ig{position:absolute;background:rgba(184,90,61,.30);display:none;pointer-events:none;
      font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#fff;padding:3px 5px;letter-spacing:.05em}
  .ig.show{display:block}
  #igTop{top:0;left:0;right:0;height:10.4%}
  #igBot{bottom:0;left:0;right:0;height:16.7%}
  #igRight{top:10.4%;bottom:16.7%;right:0;width:11.1%}
  #igLeft{top:10.4%;bottom:16.7%;left:0;width:5.6%}
  #seek{flex:1;accent-color:var(--moss)}
  .time{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);min-width:64px;text-align:right}
  .hint{font-size:11px;color:var(--muted);text-align:center;margin:6px 0 16px;
        font-family:ui-monospace,Menlo,monospace;letter-spacing:.06em}

  .field{margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;letter-spacing:.08em}
  input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--line);background:#fff;
                   font-family:inherit;font-size:15px;color:var(--ink);border-radius:2px}
  input[type=range]{width:100%;accent-color:var(--moss)}
  .stat{padding:10px 12px;margin-bottom:10px;border-radius:2px;font-size:14px;display:none}
  .stat.go{display:block;background:#f3f0e8;color:#6b6455}
  .stat.ok{display:block;background:#e8f0e4;color:#2f5d2a}
  .stat.bad{display:block;background:#f6e9e4;color:#8a4a30}
  select{width:100%;padding:10px 12px;border:1px solid var(--line);background:#fff;
         font-family:inherit;font-size:14px;color:var(--ink);border-radius:2px}
  .row{display:flex;gap:12px}.row .field{flex:1}
  .val{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--moss);float:right}

  .send{width:100%;padding:15px;background:var(--moss);color:var(--paper);border:none;font-family:inherit;
        font-size:16px;letter-spacing:.12em;cursor:pointer;margin-top:6px;border-radius:2px}
  #out{margin-top:14px;display:none}
  #out textarea{width:100%;height:150px;font-family:ui-monospace,Menlo,monospace;font-size:11px;padding:10px;
                border:1px solid var(--line);background:#fff;color:var(--body);border-radius:2px}
  .copy{width:100%;padding:12px;background:#fff;color:var(--moss);border:1px solid var(--moss);
        font-family:inherit;font-size:14px;letter-spacing:.1em;cursor:pointer;margin-top:8px;border-radius:2px}
  .note{font-size:11px;color:var(--muted);line-height:1.7;margin-top:12px}
</style>
</head>
<body>
<header>
  <h1>植間 Reels 微調台</h1>
  <div class="sub">TUNING PANEL / 試作01</div>
</header>

<div class="load">
  <label>預覽片自動載入・如要改用其他影片可在此選檔（不會上傳）</label>
  <input type="file" id="pick" accept="video/*" />
</div>

<div class="tabs" id="tabs"></div>

<div class="stage" id="stage">
  <video id="vid" playsinline muted preload="metadata"></video>
  <div class="empty" id="empty">載入影片後<br>就能一邊播放一邊調字幕</div>
  <div class="ig" id="igTop">帳號名・追蹤鍵</div>
  <div class="ig" id="igBot">貼文文案・音訊・按鈕</div>
  <div class="ig" id="igRight">互動鍵</div>
  <div class="ig" id="igLeft"></div>
</div>

<div class="bar">
  <button class="play" id="play">播放</button>
  <input type="range" id="seek" min="0" max="13.33" step="0.05" value="0" />
  <span class="time" id="tval">0.00s</span>
</div>
<div class="bar">
  <button class="play undo" id="undo" disabled>上一步</button>
  <button class="play undo" id="redo" disabled>下一步</button>
  <span class="time" id="hist"></span>
</div>
<div class="bar">
  <span class="plab">位置</span>
  <button class="pos" data-y="0.21">上方</button>
  <button class="pos" data-y="0.50">中央</button>
  <button class="pos" data-y="0.71">中下・推薦</button>
  <button class="pos zone" id="zone">遮擋區</button>
</div>
<div class="hint">切到某句會自動跳到它出現的時間・可直接拖曳</div>

<div class="row">
  <div class="field">
    <label>中文字型</label>
    <select id="fzh">
      <option value='"source-han-serif-tc",serif'>思源宋體 · 襯線</option>
      <option value='"shippori-mincho","source-han-serif-tc",serif'>Shippori Mincho · 品牌指定</option>
      <option value='"source-han-sans-cjk-tc",sans-serif'>思源黑體 · 黑體</option>
      <option value='"Songti TC",serif'>系統宋體 · 目前用</option>
    </select>
  </div>
  <div class="field">
    <label>英文字型</label>
    <select id="fen">
      <option value='"avenir-next-lt-pro",sans-serif'>Avenir Next · 乾淨</option>
      <option value='"josefin-sans",sans-serif'>Josefin Sans · 幾何細緻</option>
      <option value='"montserrat",sans-serif'>Montserrat · 現代</option>
      <option value='"cormorant-garamond",serif'>Cormorant · 優雅襯線</option>
      <option value='"playfair-display",serif'>Playfair · 高級襯線</option>
      <option value='ui-sans-serif,system-ui,sans-serif'>系統無襯線 · 目前用</option>
    </select>
  </div>
</div>

<div class="field">
  <label>中文字幕</label>
  <input type="text" id="zh" />
</div>
<div class="field">
  <label>英文字幕（留空我自動翻譯・要指定才填）</label>
  <input type="text" id="en" placeholder="留空即可，我依中文自動產出" />
</div>
<div class="row">
  <div class="field">
    <label>出現時間 <span class="val" id="stv"></span></label>
    <input type="range" id="st" min="0" max="13" step="0.1" />
  </div>
  <div class="field">
    <label>停留長度 <span class="val" id="dur"></span></label>
    <input type="range" id="du" min="0.8" max="5" step="0.1" />
  </div>
</div>

<button class="send" id="send">送 出</button>

<div id="out">
  <div id="stat" class="stat"></div>
  <textarea id="json" readonly></textarea>
  <button class="copy" id="copy">複製參數</button>
  <div class="note">送出後直接進 Claude 的收件匣、不用複製貼上。（自動傳送失敗時才用上面的複製鍵）</div>
</div>

<script>
const CAPS=[
 {zh:"每到夏天",en:"Every summer",st:0.4,du:2.1,x:0.5,y:0.71},
 {zh:"這是我澆水的方式",en:"This is how I water",st:2.3,du:2.1,x:0.5,y:0.71},
 {zh:"看到植物們點頭如搗蒜",en:"When every leaf nods back",st:4.3,du:2.5,x:0.5,y:0.71},
 {zh:"我就知道他們很開心",en:"I know they're happy",st:6.6,du:2.2,x:0.5,y:0.71},
 {zh:"這個夏天，記得讓植物多喝點水",en:"This summer, give your plants a good drink",st:8.7,du:2.3,x:0.5,y:0.71}
];
let cur=0, boxes=[];
const FONT={zh:'"source-han-serif-tc",serif', en:'"avenir-next-lt-pro",sans-serif'};
const $=id=>document.getElementById(id);
const stage=$("stage"), vid=$("vid"), tabs=$("tabs");

CAPS.forEach((c,i)=>{
  const b=document.createElement("div");
  b.className="tab"+(i===0?" on":""); b.textContent=i+1;
  b.onclick=()=>{ save(); cur=i; seekTo(CAPS[i].st+0.25); load(); };
  tabs.appendChild(b);

  const box=document.createElement("div");
  box.className="capbox";
  box.innerHTML='<div class="zh"></div><div class="en"></div>';
  stage.appendChild(box); boxes.push(box);
  box.addEventListener("mousedown",e=>startDrag(e,i));
  box.addEventListener("touchstart",e=>startDrag(e,i),{passive:false});
});

function paint(){
  const t=vid.duration?vid.currentTime:parseFloat($("seek").value);
  CAPS.forEach((c,i)=>{
    const box=boxes[i];
    box.querySelector(".zh").textContent=(i===cur?$("zh").value:c.zh);
    box.querySelector(".en").textContent=(i===cur?$("en").value:c.en);
    box.querySelector(".zh").style.fontFamily=FONT.zh;
    box.querySelector(".en").style.fontFamily=FONT.en;
    box.style.left=(c.x*100)+"%"; box.style.top=(c.y*100)+"%";
    const live=t>=c.st && t<=c.st+c.du;
    box.classList.toggle("show", live || (i===cur && vid.paused));
    box.classList.toggle("editing", i===cur && vid.paused);
  });
  $("tval").textContent=t.toFixed(2)+"s";
  const c0=CAPS[cur];
  document.querySelectorAll(".pos[data-y]").forEach(b=>{
    b.classList.toggle("on", Math.abs(c0.x-0.5)<0.005 && Math.abs(c0.y-parseFloat(b.dataset.y))<0.005);
  });
}
function load(){
  const c=CAPS[cur];
  [...tabs.children].forEach((t,i)=>t.classList.toggle("on",i===cur));
  $("zh").value=c.zh; $("en").value=c.en;
  $("st").value=c.st; $("du").value=c.du;
  $("stv").textContent=c.st.toFixed(1)+"s"; $("dur").textContent=c.du.toFixed(1)+"s";
  paint();
}
function save(){
  const c=CAPS[cur];
  c.zh=$("zh").value; c.en=$("en").value;
  c.st=parseFloat($("st").value); c.du=parseFloat($("du").value);
}
function seekTo(t){ if(vid.duration){ vid.currentTime=Math.min(vid.duration,Math.max(0,t)); } $("seek").value=t; paint(); }

$("pick").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  vid.src=URL.createObjectURL(f);
  vid.onloadedmetadata=()=>{
    $("empty").style.display="none";
    $("seek").max=vid.duration.toFixed(2);
    seekTo(CAPS[cur].st+0.25);
  };
});

$("play").onclick=()=>{
  if(!vid.src) return;
  if(vid.paused){ vid.play(); $("play").textContent="暫停"; }
  else { vid.pause(); $("play").textContent="播放"; }
  paint();
};
vid.addEventListener("timeupdate",()=>{ $("seek").value=vid.currentTime; paint(); });
vid.addEventListener("pause",()=>{ $("play").textContent="播放"; paint(); });
$("seek").addEventListener("input",e=>{ if(!vid.paused) vid.pause(); seekTo(parseFloat(e.target.value)); });

["zh","en"].forEach(id=>$(id).addEventListener("input",paint));
$("st").addEventListener("input",e=>{ CAPS[cur].st=parseFloat(e.target.value);
  $("stv").textContent=(+e.target.value).toFixed(1)+"s"; seekTo(CAPS[cur].st+0.25); });
$("du").addEventListener("input",e=>{ CAPS[cur].du=parseFloat(e.target.value);
  $("dur").textContent=(+e.target.value).toFixed(1)+"s"; paint(); });

let dragging=false;
const pt=e=>e.touches?e.touches[0]:e;
function startDrag(e,i){ if(i!==cur||!vid.paused) return; dragging=true; e.preventDefault(); }
// IG 安全區（依 IG Reels 遮擋實測：上200px 下320px 右120px 左60px @1080x1920）
const SAFE={top:0.15, bottom:0.79, left:0.30, right:0.70};
function moveDrag(e){
  if(!dragging) return;
  const r=stage.getBoundingClientRect(), p=pt(e);
  CAPS[cur].x=Math.min(SAFE.right,Math.max(SAFE.left,(p.clientX-r.left)/r.width));
  CAPS[cur].y=Math.min(SAFE.bottom,Math.max(SAFE.top,(p.clientY-r.top)/r.height));
  paint(); e.preventDefault();
}
window.addEventListener("mousemove",moveDrag);
window.addEventListener("touchmove",moveDrag,{passive:false});
function endDrag(){ if(dragging){ dragging=false; snap(); } }
window.addEventListener("mouseup",endDrag);
window.addEventListener("touchend",endDrag);

// 歷史紀錄：上一步／下一步，避免誤調
let hist=[], hp=-1;
function snap(){
  save();
  hist=hist.slice(0,hp+1);
  hist.push(JSON.parse(JSON.stringify(CAPS)));
  if(hist.length>60){ hist.shift(); }
  hp=hist.length-1; hbtn();
}
function hbtn(){
  $("undo").disabled = hp<=0;
  $("redo").disabled = hp>=hist.length-1;
  $("hist").textContent = hist.length>1 ? (hp+1)+" / "+hist.length : "";
}
function restore(i){
  hp=i;
  hist[hp].forEach((s,k)=>Object.assign(CAPS[k],s));
  load(); hbtn();
}
$("undo").onclick=()=>{ if(hp>0) restore(hp-1); };
$("redo").onclick=()=>{ if(hp<hist.length-1) restore(hp+1); };
// 位置預設區（依 IG Reels 字幕攻略）
document.querySelectorAll(".pos[data-y]").forEach(b=>{
  b.onclick=()=>{ CAPS[cur].x=0.5; CAPS[cur].y=parseFloat(b.dataset.y); paint(); snap(); };
});
$("fzh").onchange=e=>{ FONT.zh=e.target.value; paint(); };
$("fen").onchange=e=>{ FONT.en=e.target.value; paint(); };

$("zone").onclick=()=>{
  const on=$("zone").classList.toggle("on");
  ["igTop","igBot","igRight","igLeft"].forEach(id=>$(id).classList.toggle("show",on));
};

["zh","en"].forEach(id=>$(id).addEventListener("change",snap));
$("st").addEventListener("change",snap);
$("du").addEventListener("change",snap);

const INBOX="https://script.google.com/macros/s/AKfycbxBqNeM8AKbKVn4VIUcrAe73WRMJzH5x31e2VjhE9uSRdtmcU3i7029tR35K6vKA90B/exec?action=reelsTunerSubmit";
const SUBMIT_TOKEN="7c7e94a5e2af4764a94cccf49c31aa0f";

async function deliver(jsonText){
  const st=$("stat");
  st.textContent="傳送中…"; st.className="stat go";
  const obj=JSON.parse(jsonText);
  if(!obj.title) obj.title=obj.reel||"微調參數";
  try{const q=new URLSearchParams(location.search);if(q.get("id"))obj.apId=q.get("id");}catch(_){}
  const body=new URLSearchParams({token:SUBMIT_TOKEN,payload:JSON.stringify(obj)});
  try{
    const r=await fetch(INBOX,{method:"POST",body:body});
    const d=await r.json();
    if(!d.ok) throw new Error(d.error||"unknown");
    st.textContent="✅ 已送達協作板（"+d.at+"）、植影所會自動取件"; st.className="stat ok";
  }catch(err){
    st.textContent="⚠ 自動傳送沒成功，請按下面「複製參數」貼給我";
    st.className="stat bad";
  }
}

$("send").onclick=()=>{
  save();
  $("json").value=JSON.stringify({
    reel:"試作01", canvas:{w:1080,h:1920},
    enPolicy:"留空者由 Claude 依中文自動翻譯",
    fonts:{ zh:$("fzh").selectedOptions[0].textContent, en:$("fen").selectedOptions[0].textContent,
            zhCss:FONT.zh, enCss:FONT.en },
    captions:CAPS.map((c,i)=>({n:i+1,zh:c.zh,en:c.en||"(auto)",
      start:+c.st.toFixed(2),duration:+c.du.toFixed(2),
      pos:{xPct:+(c.x*100).toFixed(1),yPct:+(c.y*100).toFixed(1)},
      px:{x:Math.round(c.x*1080),y:Math.round(c.y*1920)}}))
  },null,1);
  $("out").style.display="block"; $("out").scrollIntoView({behavior:"smooth"});
  deliver($("json").value);
};
$("copy").onclick=async()=>{
  try{ await navigator.clipboard.writeText($("json").value); }
  catch(_){ $("json").select(); document.execCommand("copy"); }
  $("copy").textContent="已複製"; setTimeout(()=>$("copy").textContent="複製參數",1600);
};

load();
snap();

// 自動載入預覽片（總管 AN-0076 准：360p + 浮水印 + previews/ 子夾）
vid.src="previews/trial01_360p.mp4";
vid.onloadedmetadata=()=>{
  $("empty").style.display="none";
  $("seek").max=vid.duration.toFixed(2);
  seekTo(CAPS[cur].st+0.25);
};
vid.onerror=()=>{ $("empty").innerHTML="預覽片載入失敗<br>可用上方選檔手動載入"; };
</script>
</body>
</html>
