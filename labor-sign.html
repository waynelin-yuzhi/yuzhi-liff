<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>植間設計｜勞務報酬單簽收</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: "Noto Sans TC", -apple-system, sans-serif; background: #F2EDE3; color: #1B1A17; line-height: 1.7; padding: 24px 14px 60px; margin: 0; }
  .wrap { max-width: 520px; margin: 0 auto; }
  .brand { font-size: 11px; letter-spacing: .3em; color: #5F6E58; font-weight: 700; text-align: center; margin-bottom: 4px; }
  h1 { font-size: 19px; text-align: center; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #8a8275; text-align: center; margin-bottom: 16px; }
  .card { background: #FFFCF5; border-radius: 12px; padding: 20px 18px; box-shadow: 0 4px 16px rgba(0,0,0,.06); margin-bottom: 14px; }
  .row { display: flex; gap: 12px; padding: 7px 0; border-bottom: .5px solid #EDE9DE; font-size: 13.5px; }
  .row:last-child { border-bottom: none; }
  .k { width: 110px; flex: none; font-size: 11px; color: #A09A8C; letter-spacing: .1em; padding-top: 2px; }
  .amt { background: #F4F1E8; border-radius: 8px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .amt b { font-size: 19px; color: #5F6E58; }
  .decl { font-size: 13px; color: #4A4A45; background: #f0f3ee; border-radius: 8px; padding: 12px 14px; margin: 14px 0 0; }
  canvas.pad { width: 100%; height: 170px; background: #fff; border: 1.5px dashed #C9C2B0; border-radius: 8px; touch-action: none; }
  .btn { display: block; width: 100%; padding: 14px; background: #5F6E58; color: #FFFCF5; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn[disabled] { opacity: .55; }
  .clr { background: none; border: none; color: #8a8275; font-size: 13px; text-decoration: underline; padding: 8px; cursor: pointer; }
  .done-card { background: #FFFCF5; border-radius: 12px; padding: 30px 22px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
  .done-card h2 { color: #5F6E58; font-size: 18px; margin: 0 0 8px; }
  .done-card h2.err { color: #A4392D; }
  .done-card p { font-size: 14px; color: #4A4A45; margin: 0; }
  .idgrid { display: flex; gap: 10px; }
  .idslot { flex: 1; border: 1.5px dashed #C9C2B0; border-radius: 8px; min-height: 96px; padding: 8px; text-align: center; cursor: pointer; background: #fff; }
  .idph { font-size: 12.5px; color: #8a8275; padding: 22px 0; }
  .idst { font-size: 10.5px; color: #B8893E; margin-top: 4px; line-height: 1.4; }
  .idslot img { width: 100%; border-radius: 6px; display: block; }
  .ft { margin: 26px auto 12px; text-align: center; font-size: 10.5px; color: #A09A8C; line-height: 1.8; }
  /* 即時相機（四角對位框） */
  #cam { display: none; position: fixed; inset: 0; background: #000; z-index: 50; }
  #camv { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #camwin { position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%); width: 88vw; max-width: 500px; aspect-ratio: 1.586; box-shadow: 0 0 0 200vmax rgba(0,0,0,.55); border-radius: 10px; }
  .cnr { position: absolute; width: 26px; height: 26px; border: 0 solid #fff; }
  .cnr.tl { left: -2px; top: -2px; border-left-width: 3.5px; border-top-width: 3.5px; border-top-left-radius: 10px; }
  .cnr.tr { right: -2px; top: -2px; border-right-width: 3.5px; border-top-width: 3.5px; border-top-right-radius: 10px; }
  .cnr.bl { left: -2px; bottom: -2px; border-left-width: 3.5px; border-bottom-width: 3.5px; border-bottom-left-radius: 10px; }
  .cnr.br { right: -2px; bottom: -2px; border-right-width: 3.5px; border-bottom-width: 3.5px; border-bottom-right-radius: 10px; }
  #camhint { position: absolute; left: 0; right: 0; top: calc(40% + 30vw); margin-top: 34px; text-align: center; color: #fff; font-size: 14px; text-shadow: 0 1px 4px rgba(0,0,0,.6); }
  #cambar { position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 22px calc(26px + env(safe-area-inset-bottom)); display: flex; gap: 12px; align-items: center; }
  #camshoot { flex: 1; padding: 15px; background: #5F6E58; color: #fff; border: none; border-radius: 10px; font-size: 16.5px; font-weight: 700; }
  #camcancel { padding: 15px 18px; background: rgba(255,255,255,.16); color: #fff; border: none; border-radius: 10px; font-size: 14.5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">YUZHI PLANT DESIGN</div>
  <div id="app"><div class="done-card"><h2>載入中…</h2><p>正在讀取勞務報酬單</p></div></div>
  <div class="ft">此頁面由植間設計 Workspace 系統發出<br>植間設計股份有限公司｜統編 90877240<br><span style="opacity:.55">labor-sign v9</span></div>
</div>
<div id="cam">
  <video id="camv" autoplay playsinline muted></video>
  <div id="camwin"><span class="cnr tl"></span><span class="cnr tr"></span><span class="cnr bl"></span><span class="cnr br"></span></div>
  <div id="camhint">將身分證平放、對齊四角框內</div>
  <div id="cambar"><button id="camcancel" type="button">取消</button><button id="camshoot" type="button">拍攝</button></div>
</div>
<script src="pad.js?v=1"></script>
<script>
/* LINE 內建瀏覽器偵測：Flex 按鈕有時不吃 openExternalBrowser=1 → 頁內再導一次觸發跳外部；再不行給手動指示 */
var IN_LINE = (navigator.userAgent || '').indexOf('Line/') >= 0;
if (IN_LINE && !sessionStorage.getItem('yzExtTry')) {
  sessionStorage.setItem('yzExtTry', '1');
  location.replace(location.href);
}
var API = 'https://script.google.com/macros/s/AKfycbxBqNeM8AKbKVn4VIUcrAe73WRMJzH5x31e2VjhE9uSRdtmcU3i7029tR35K6vKA90B/exec';
var HASH = new URLSearchParams(location.search).get('h') || '';
var IDS = { front: '', back: '' };
var NEED_CAP = true, RECAP = false, WM_YEAR = '', NAME = '';
var app = document.getElementById('app');

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function doneCard(title, msg, err) {
  app.innerHTML = '<div class="done-card"><h2' + (err ? ' class="err"' : '') + '>' + esc(title) + '</h2><p>' + esc(msg) + '</p></div>';
  window.scrollTo(0, 0);
}

if (!HASH) {
  doneCard('連結無效', '找不到這張勞報單；請與植間聯繫。', true);
} else {
  fetch(API + '?page=labor-sign&h=' + encodeURIComponent(HASH) + '&fmt=json')
    .then(function (r) { return r.json(); })
    .then(render)
    .catch(function () { doneCard('載入失敗', '請關閉頁面後重新點一次卡片按鈕。', true); });
}

function render(d) {
  if (!d || d.status === 'invalid') { doneCard('連結無效', '找不到這張勞報單；請與植間聯繫。', true); return; }
  if (d.status === '已簽') { doneCard('已完成簽收', (d.name || '') + '　勞務報酬單已簽署留存。'); return; }
  NEED_CAP = !!d.needCap; WM_YEAR = d.wmYear || ''; NAME = d.name || '';
  var v = d.values || {};
  var row = function (k, val) { return '<div class="row"><div class="k">' + k + '</div><div>' + esc(val || '—') + '</div></div>'; };
  var idSlot = function (w, label) {
    return '<div style="flex:1;min-width:0"><div class="idslot" data-side="' + w + '"><img id="pv_' + w + '" style="display:none" alt="">'
      + '<div id="ph_' + w + '" class="idph">點此拍攝<br>' + label + '</div><div id="st_' + w + '" class="idst"></div>'
      + '<input type="file" id="f_' + w + '" accept="image/*" capture="environment" style="display:none">'
      + '<input type="file" id="g_' + w + '" accept="image/*" style="display:none"></div>'
      + '<button type="button" class="clr" id="al_' + w + '" style="display:block;margin:2px auto 0;padding:5px">從相簿選</button></div>';
  };
  var lineWarn = IN_LINE
    ? '<div class="card" style="background:#FBF3E4;border:1px solid #E3C990;padding:12px 14px;font-size:12.5px;color:#8a6a2e">'
      + '現在是 LINE 內建瀏覽器、無法開相機。請點畫面角落的「…」或「分享」選單 → 選「<b>以預設瀏覽器開啟</b>」再拍攝；或改用「從相簿選」。</div>'
    : '';
  var gridInner = '<div style="font-size:13px;color:#4A4A45;margin-bottom:2px">身分證影本（報稅申報用）</div>'
    + '<div style="font-size:11.5px;color:#8a8275;margin-bottom:10px">對齊框內拍攝、系統自動裁切成證件大小，並轉成黑白影本＋「僅供報稅申報使用」浮水印；不會留存彩色原照。</div>'
    + '<div class="idgrid">' + idSlot('front', '正面') + idSlot('back', '背面') + '</div>'
    + '<div style="font-size:10.5px;color:#A09A8C;margin-top:6px">點格子開相機對位拍攝；想用拍好的照片請點「從相簿選」。</div>';
  var idCard = NEED_CAP
    ? '<div class="card" id="idcard">' + gridInner + '</div>'
    : '<div class="card" id="idcard" style="padding:12px 18px;font-size:12.5px;color:#5F6E58">身分證影本已建檔，簽收後將自動附於文件。'
      + '<button type="button" class="clr" id="recap" style="display:block;padding:6px 0 0 0">換發新身分證了？點此重新拍攝</button></div>';
  app.innerHTML = '<h1>勞務報酬單簽收</h1><div class="sub">' + esc(NAME) + '</div>' + lineWarn
    + '<div class="card">'
    + row('工作內容', v['工作內容']) + row('工作期間', v['工作期間']) + row('所得類別', v['所得類別'])
    + row('給付總額', v['給付總額'] ? 'NT$ ' + v['給付總額'] : '') + row('代扣所得稅', v['代扣所得稅'])
    + row('二代健保', v['二代健保補充保費代扣']) + row('給付方式', v['給付方式']) + row('給付日期', v['給付日期'])
    + '<div class="amt"><span style="font-size:11px;color:#6B675E;letter-spacing:.15em">實付金額</span><b>NT$ ' + esc(v['實付金額'] || '—') + '</b></div>'
    + '<div class="decl">' + (d.amountUpper
      ? '茲收到　植間設計股份有限公司　支付本人之勞務報酬，共計<b>新台幣' + esc(d.amountUpper) + '元整</b>；本人確認內容無誤、並已如數受領。'
      : '本人確認上列勞務報酬內容無誤、並已如數受領。') + '</div></div>'
    + idCard
    + '<div class="card"><div style="font-size:13px;color:#4A4A45;margin-bottom:6px">親筆簽名</div><canvas id="cv" class="pad"></canvas>'
    + '<div style="text-align:right"><button class="clr" id="clr">清除重簽</button></div>'
    + '<button class="btn" id="go">確認簽收</button></div>';
  function bindGrid() {
    ['front', 'back'].forEach(function (w) {
      document.querySelector('.idslot[data-side="' + w + '"]').addEventListener('click', function () { idPick(w); });
      document.getElementById('al_' + w).addEventListener('click', function () { document.getElementById('g_' + w).click(); });
      document.getElementById('f_' + w).addEventListener('change', function () { fileProc(w, this); });
      document.getElementById('g_' + w).addEventListener('change', function () { fileProc(w, this); });
    });
  }
  if (NEED_CAP) bindGrid();
  else {
    var rc = document.getElementById('recap');
    if (rc) rc.addEventListener('click', function () {
      RECAP = true;
      var el = document.getElementById('idcard');
      el.removeAttribute('style');
      el.innerHTML = gridInner;
      bindGrid();
    });
  }
  initPad();
  document.getElementById('clr').addEventListener('click', cvClear);
  document.getElementById('go').addEventListener('click', doSign);
}

/* 入口：能開即時相機（框框對位）就開；不行退回系統相機 */
function idPick(w) {
  if (!IN_LINE && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) openCam(w);
  else document.getElementById('f_' + w).click();
}

/* ── 即時相機：四角框對位 → 拍攝即裁切框內 ── */
var CAM_SIDE = '', CAM_STREAM = null;
var camEl = document.getElementById('cam'), camV = document.getElementById('camv');
document.getElementById('camcancel').addEventListener('click', closeCam);
document.getElementById('camshoot').addEventListener('click', shootCam);
function openCam(w) {
  CAM_SIDE = w;
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false })
    .then(function (stream) {
      CAM_STREAM = stream;
      camV.srcObject = stream;
      camEl.style.display = 'block';
      document.body.style.overflow = 'hidden';
    })
    .catch(function () { document.getElementById('f_' + w).click(); });
}
function closeCam() {
  camEl.style.display = 'none';
  document.body.style.overflow = '';
  if (CAM_STREAM) { CAM_STREAM.getTracks().forEach(function (t) { t.stop(); }); CAM_STREAM = null; }
  camV.srcObject = null;
}
function shootCam() {
  if (!CAM_STREAM || !camV.videoWidth) return;
  var vw = camV.videoWidth, vh = camV.videoHeight;
  var ew = window.innerWidth, eh = window.innerHeight;
  var er = ew / eh, vr = vw / vh;
  var sw, sh, sx, sy;   /* object-fit:cover 之下、畫面上實際可見的原始像素區 */
  if (vr > er) { sh = vh; sw = vh * er; sx = (vw - sw) / 2; sy = 0; }
  else { sw = vw; sh = vw / er; sx = 0; sy = (vh - sh) / 2; }
  var r = document.getElementById('camwin').getBoundingClientRect();
  var kx = sw / ew, ky = sh / eh;
  var cx = sx + r.left * kx, cy = sy + r.top * ky, cw = r.width * kx, ch = r.height * ky;
  var c = document.createElement('canvas');
  c.width = Math.round(cw); c.height = Math.round(ch);
  c.getContext('2d').drawImage(camV, cx, cy, cw, ch, 0, 0, c.width, c.height);
  var side = CAM_SIDE;
  closeCam();
  if (c.width < 500) {
    var st = document.getElementById('st_' + side);
    st.textContent = '解析度不足、請改用系統相機';
    document.getElementById('f_' + side).click();
    return;
  }
  applyCopy(c, side);
}

/* ── 相簿 / 系統相機路徑：整張照片進處理管線 ── */
function fileProc(w, inp) {
  if (!inp.files || !inp.files[0]) return;
  var st = document.getElementById('st_' + w);
  st.textContent = '處理中…';
  var img = new Image();
  img.onload = function () {
    if (Math.max(img.width, img.height) < 1000) {
      st.textContent = '照片太小、請重拍';
      alert('解析度不足，請靠近一點、對焦後重拍'); inp.value = ''; return;
    }
    applyCopy(img, w);
    inp.value = '';
  };
  img.src = URL.createObjectURL(inp.files[0]);
}

/* ── 共用管線：縮圖 → 灰階拉對比（影印感）→ 亮度檢核 → 用途浮水印 → JPEG ── */
function applyCopy(src, w) {
  var st = document.getElementById('st_' + w);
  var mx = Math.max(src.width, src.height);
  var sc = mx > 1600 ? 1600 / mx : 1;
  var w2 = Math.round(src.width * sc), h2 = Math.round(src.height * sc);
  var c = document.createElement('canvas'); c.width = w2; c.height = h2;
  var x = c.getContext('2d');
  x.drawImage(src, 0, 0, w2, h2);
  var da = x.getImageData(0, 0, w2, h2), d = da.data, sum = 0, i, g;
  for (i = 0; i < d.length; i += 4) {
    g = 0.3 * d[i] + 0.59 * d[i + 1] + 0.11 * d[i + 2];
    sum += g;
    g = (g - 128) * 1.45 + 134;
    if (g < 0) g = 0; if (g > 255) g = 255;
    d[i] = g; d[i + 1] = g; d[i + 2] = g;
  }
  var avg = sum / (d.length / 4);
  if (avg < 42) { st.textContent = '照片太暗、請重拍'; alert('光線不足，請在亮一點的地方重拍'); return; }
  x.putImageData(da, 0, 0);
  x.save(); x.translate(w2 / 2, h2 / 2); x.rotate(-0.32);
  x.fillStyle = 'rgba(120,120,120,0.16)';
  x.font = 'bold ' + Math.round(w2 / 22) + 'px sans-serif';
  x.textAlign = 'center';
  var wm = '僅供 ' + WM_YEAR + ' 年度報稅申報使用';
  for (var yy = -h2; yy <= h2; yy += Math.round(w2 / 5)) x.fillText(wm, 0, yy);
  x.restore();
  var du = c.toDataURL('image/jpeg', 0.82);
  IDS[w] = du.slice(du.indexOf(',') + 1);
  var pv = document.getElementById('pv_' + w);
  pv.src = du; pv.style.display = 'block';
  document.getElementById('ph_' + w).style.display = 'none';
  st.textContent = '看得清楚再送出；不清楚請點圖重拍';
}

/* ── 簽名板（共用元件 pad.js）── */
var PAD = null;
function initPad() { PAD = initYzPad(document.getElementById('cv')); }
function cvClear() { if (PAD) PAD.clear(); }

/* ── 送出：fetch POST（簡單請求、免預檢）→ 讀不到回應就用狀態輪詢兜底 ── */
function doSign() {
  if (NEED_CAP && (!IDS.front || !IDS.back)) { alert('請先拍攝身分證正面與背面'); return; }
  if (RECAP && ((IDS.front ? 1 : 0) + (IDS.back ? 1 : 0) === 1)) { alert('重拍請正反兩面都拍；若不換、兩格留空即沿用已建檔影本'); return; }
  if (!PAD || !PAD.hasInk()) { alert('請先簽名'); return; }
  var btn = document.getElementById('go');
  btn.disabled = true; btn.textContent = '送出中…';
  var png = PAD.dataUrl().split(',')[1];
  var body = new URLSearchParams();
  body.append('publicSign', 'labor'); body.append('hash', HASH);
  body.append('signerName', NAME); body.append('png', png); body.append('respond', 'json');
  if (IDS.front) body.append('idFront', IDS.front);
  if (IDS.back) body.append('idBack', IDS.back);
  fetch(API + '?publicSign=labor&respond=json', { method: 'POST', body: body, redirect: 'follow' })
    .then(function (r) { return r.json(); })
    .then(function (res) {
      if (res && res.status === 'success') { doneCard('已完成簽收', '文件已留存、植間已收到通知，感謝您！'); }
      else { btn.disabled = false; btn.textContent = '確認簽收'; alert((res && res.msg) || '送出失敗、請再試一次'); }
    })
    .catch(function () { pollCheck(btn, 0); });
}
function pollCheck(btn, n) {
  fetch(API + '?page=labor-sign&h=' + encodeURIComponent(HASH) + '&fmt=json')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.status === '已簽') { doneCard('已完成簽收', '文件已留存、植間已收到通知，感謝您！'); }
      else if (n < 3) { setTimeout(function () { pollCheck(btn, n + 1); }, 2500); }
      else { btn.disabled = false; btn.textContent = '確認簽收'; alert('送出可能沒有成功，請再按一次'); }
    })
    .catch(function () {
      if (n < 3) setTimeout(function () { pollCheck(btn, n + 1); }, 2500);
      else { btn.disabled = false; btn.textContent = '確認簽收'; alert('送出可能沒有成功，請再按一次'); }
    });
}
</script>
</body>
</html>
