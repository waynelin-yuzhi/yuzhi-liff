<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>植間設計｜文件預覽</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F2EDE3; font-family: "Noto Sans TC", -apple-system, sans-serif; }
  .bar { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 14px; }
  .brand { font-size: 11px; letter-spacing: .3em; color: #5F6E58; font-weight: 700; }
  .dl { background: #5F6E58; color: #FFFCF5; text-decoration: none; font-size: 13.5px; font-weight: 700; padding: 9px 18px; border-radius: 8px; }
  iframe { display: block; width: 100%; max-width: 900px; margin: 0 auto; height: 82vh; border: 0; background: #fff; box-shadow: 0 2px 18px rgba(27,26,23,.12); }
  .err { max-width: 420px; margin: 80px auto; background: #FFFCF5; border-radius: 12px; padding: 30px 22px; text-align: center; font-size: 14px; color: #4A4A45; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
  .ft { margin: 18px auto 14px; text-align: center; font-size: 10.5px; color: #A09A8C; line-height: 1.8; }
</style>
</head>
<body>
<div id="app"></div>
<div class="ft">此頁面由植間設計 Workspace 系統發出<br>植間設計股份有限公司｜統編 90877240<br><span style="opacity:.55">doc-view v1</span></div>
<script>
var raw = new URLSearchParams(location.search).get('id') || '';
var id = raw.replace(/[^A-Za-z0-9_-]/g, '');
var app = document.getElementById('app');
if (!id) {
  app.innerHTML = '<div class="err">連結無效；請與植間聯繫。</div>';
} else {
  var dl = 'https://drive.google.com/uc?export=download&id=' + id;
  app.innerHTML = '<div class="bar"><span class="brand">YUZHI PLANT DESIGN</span>'
    + '<a class="dl" href="' + dl + '">下載 PDF</a></div>'
    + '<iframe src="https://drive.google.com/file/d/' + id + '/preview" allow="autoplay"></iframe>';
}
</script>
</body>
</html>
