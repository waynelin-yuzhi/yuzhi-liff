<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>植間設計｜分享案例</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Noto Sans TC", -apple-system, sans-serif; background: #F2EDE3; color: #1B1A17; line-height: 1.7; padding: 40px 18px; }
  .wrap { max-width: 420px; margin: 0 auto; text-align: center; }
  .brand { font-size: 11px; letter-spacing: .3em; color: #5F6E58; font-weight: 700; margin-bottom: 10px; }
  .card { background: #FFFCF5; border-radius: 12px; padding: 28px 22px; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
  h1 { font-size: 18px; margin-bottom: 6px; }
  p { font-size: 13.5px; color: #4A4A45; }
  .btn { display: block; width: 100%; padding: 14px; background: #5F6E58; color: #FFFCF5; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; }
  .ghost { display: block; width: 100%; padding: 12px; background: none; color: #5F6E58; border: 1.5px solid #5F6E58; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .muted { font-size: 11px; color: #8a8275; margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">YUZHI PLANT DESIGN</div>
  <div class="card" id="box" style="background:none;box-shadow:none;padding:8px;">
    <h1 id="ttl" style="font-size:13px;color:#8a8275;font-weight:400;">開啟好友選單…</h1>
    <p id="msg"></p>
  </div>
  <div class="muted">share v5 · pages</div>
</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
var LIFF_ID = '2010719321-KOziooMo';
var API = 'https://script.google.com/macros/s/AKfycbxBqNeM8AKbKVn4VIUcrAe73WRMJzH5x31e2VjhE9uSRdtmcU3i7029tR35K6vKA90B/exec';
var PACK = null;
function show(t, m, btns) {
  document.getElementById('ttl').textContent = t;
  document.getElementById('msg').textContent = m || '';
  var box = document.getElementById('box');
  box.querySelectorAll('button').forEach(function (b) { b.remove(); });
  (btns || []).forEach(function (b) {
    var el = document.createElement('button');
    el.className = b.ghost ? 'ghost' : 'btn';
    el.textContent = b.label; el.onclick = b.fn;
    box.appendChild(el);
  });
}
function getPackedData() {
  var m = location.search.match(/[?&]d=([A-Za-z0-9_-]+)/);
  if (!m) {
    var s = location.search.match(/liff\.state=([^&]+)/);
    if (s) {
      var st = decodeURIComponent(s[1]);
      var m2 = st.match(/[?&]?d=([A-Za-z0-9_-]+)/);
      if (m2) m = m2;
    }
  }
  if (!m) return null;
  try {
    var b = m[1].replace(/-/g, '+').replace(/_/g, '/');
    while (b.length % 4) b += '=';
    var p = JSON.parse(decodeURIComponent(escape(atob(b))));
    return (p && p.f) ? { p: p, raw: m[1] } : null;
  } catch (e) { return null; }
}
function buildBubble(p, rawD) {
  var caseUrl = API + '?page=cases&case=' + p.f;
  var shareUrl = 'https://liff.line.me/' + LIFF_ID + '?d=' + rawD;
  var bubble = {
    type: 'bubble',
    header: { type: 'box', layout: 'vertical', paddingAll: '16px', contents: [
      { type: 'text', text: 'yuzhiplant \u00b7 \u6848\u4f8b\u5206\u4eab', size: 'xs', color: '#E9EDE3' },
      { type: 'text', text: p.t || '\u6848\u4f8b\u5206\u4eab', size: 'xl', color: '#FFFCF5', weight: 'bold', wrap: true, margin: 'sm' }
    ]},
    body: { type: 'box', layout: 'vertical', spacing: 'sm', paddingAll: '20px', contents: [] },
    footer: { type: 'box', layout: 'vertical', spacing: 'sm', paddingAll: '16px', paddingTop: '0px', contents: [
      { type: 'box', layout: 'horizontal', spacing: 'sm', contents: [
        { type: 'button', style: 'primary', height: 'sm', color: '#5F6E58',
          action: { type: 'uri', label: '\u67e5\u770b\u5b8c\u6574\u6848\u4f8b', uri: caseUrl } },
        { type: 'button', style: 'secondary', height: 'sm', color: '#FFFCF5',
          action: { type: 'uri', label: '\u5206\u4eab\u7d66\u670b\u53cb', uri: shareUrl } }
      ]},
      { type: 'text', text: '\u7167\u7247\u7686\u70ba\u690d\u9593\u5be6\u969b\u65bd\u4f5c\u5be6\u666f', size: 'xxs', color: '#8a8275', align: 'center', margin: 'sm', wrap: false }
    ]},
    styles: { header: { backgroundColor: '#5F6E58' }, body: { backgroundColor: '#FFFCF5' }, footer: { backgroundColor: '#FFFCF5' } }
  };
  if (p.x) bubble.body.contents.push({ type: 'text', text: p.x, size: 'sm', color: '#4A4A45', wrap: true });
  if (p.c) bubble.hero = { type: 'image', url: 'https://lh3.googleusercontent.com/d/' + p.c + '=w1560',
    size: 'full', aspectRatio: '4:3', aspectMode: 'cover', action: { type: 'uri', uri: caseUrl } };
  return { ok: true, bubble: bubble, alt: '\u690d\u9593\uff5c\u6848\u4f8b\u5206\u4eab\uff1a' + (p.t || ''), url: caseUrl };
}
function getCaseId() {
  var m = location.search.match(/[?&]case=([\w-]+)/);
  if (m) return m[1];
  var s = location.search.match(/liff\.state=([^&]+)/);
  if (s) {
    var st = decodeURIComponent(s[1]);
    var m2 = st.match(/case=([\w-]+)/);
    if (m2) return m2[1];
  }
  return '';
}
function closeSelf() {
  try { if (liff.isInClient && liff.isInClient()) { liff.closeWindow(); return; } } catch (e) {}
  show('完成', '可以關閉此頁了');
}
function openPicker() {
  liff.shareTargetPicker([
    { type: 'flex', altText: PACK.alt || '植間設計｜案例分享', contents: PACK.bubble }
  ]).then(function (res) {
    /* 分享成功或取消都直接關窗回聊天室（Wayne：越無感越好；要再分享重按卡片即可） */
    closeSelf();
  }).catch(function () {
    show('分享沒有成功', '可以改用複製連結的方式分享', [{ label: '複製案例連結', fn: copyLink }]);
  });
}
function copyLink() {
  var ta = document.createElement('textarea');
  ta.value = (PACK && PACK.url) || '';
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  show('連結已複製', '貼到任何聊天室就能分享', [{ label: '再複製一次', fn: copyLink, ghost: true }]);
}
/* v5：資料直接從網址解（零抓取）；沒帶 d 的舊卡退回 fetch 路徑 */
var packed0 = getPackedData();
var cid0 = getCaseId();
var packP = packed0
  ? Promise.resolve(buildBubble(packed0.p, packed0.raw))
  : (cid0
      ? fetch(API + '?page=case-share&case=' + cid0 + '&fmt=json', { redirect: 'follow' }).then(function (r) { return r.json(); })
      : Promise.resolve(null));
function boot() {
  packP.then(function (d) {
    if (!d) {
      var packed = getPackedData();
      if (packed) { packP = Promise.resolve(buildBubble(packed.p, packed.raw)); boot(); return; }
      var cid = getCaseId();
      if (!cid) { show('缺少案例參數', '請重新點卡片上的分享按鈕'); return; }
      packP = fetch(API + '?page=case-share&case=' + cid + '&fmt=json', { redirect: 'follow' }).then(function (r) { return r.json(); });
      boot(); return;
    }
    if (!d.ok) { show('案例載入失敗', '請稍後再試'); return; }
    PACK = d;
    if (liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
      openPicker();
    } else {
      show('這裡無法開好友選單', '改用複製連結的方式分享', [{ label: '複製案例連結', fn: copyLink }]);
    }
  }).catch(function () { show('連線失敗', '請稍後再試', [{ label: '重試', fn: boot }]); });
}
liff.init({ liffId: LIFF_ID }).then(boot).catch(function () {
  show('LINE 初始化失敗', '請重新點一次分享按鈕', [{ label: '重試', fn: boot, ghost: true }]);
});
</script>
</body>
</html>
