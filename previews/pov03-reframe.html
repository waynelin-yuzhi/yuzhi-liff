<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>試作03 裁切台</title>
<style>
:root{--moss:#5F6E58;--paper:#F2EDE3;--ink:#1B1A17;--muted:#8a8275;--line:#E5E0D3;--warn:#8a4a30;--gold:#E8B14E}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:"Songti TC",serif;max-width:680px;margin:0 auto;padding:14px}
h1{font-size:17px}
.sub{font-size:10px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.12em;margin:2px 0 12px}
.help{font-size:13px;line-height:1.75;background:#fff;border:1px solid var(--line);border-radius:2px;padding:10px 12px;margin-bottom:12px}
.stage{position:relative;width:100%;background:#000;border:1px solid var(--line);border-radius:2px;overflow:hidden;touch-action:none}
.stage video{width:100%;display:block}
#cropbox{position:absolute;top:0;bottom:0;border:2px solid var(--gold);box-shadow:0 0 0 2000px rgba(0,0,0,.5);cursor:ew-resize}
#cropbox::after{content:"直式範圍";position:absolute;top:4px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#1b1a17;font-size:10px;font-family:ui-monospace,monospace;padding:1px 6px;border-radius:2px;white-space:nowrap}
.bar{display:flex;align-items:center;gap:10px;margin:10px 0}
.play{width:52px;padding:9px 0;background:var(--moss);color:var(--paper);border:none;border-radius:2px;font-family:inherit;font-size:13px;cursor:pointer}
#seek{flex:1;accent-color:var(--moss)}
.tval{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);min-width:56px;text-align:right}
.actrow{display:flex;gap:6px;margin-bottom:8px}
.actrow button{flex:1;padding:10px 2px;border:1px solid var(--moss);color:var(--moss);background:#fff;border-radius:2px;font-family:inherit;font-size:13px;cursor:pointer}
.actrow button.gold{border-color:var(--gold);color:#8a6d1b;background:#fdf9ee}
.actrow button.warn{border-color:var(--warn);color:var(--warn)}
.seglist{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.seg{flex:0 0 auto;padding:7px 10px;border:1px solid var(--line);background:#fff;border-radius:2px;font-size:12px;cursor:pointer;white-space:nowrap;text-align:center;line-height:1.4}
.seg.on{border-color:var(--moss);background:var(--moss);color:var(--paper)}
.seg small{display:block;font-family:ui-monospace,monospace;font-size:9px;opacity:.8}
.posrow{display:flex;gap:6px;margin-bottom:10px}
.posrow button{flex:1;padding:8px 2px;border:1px solid var(--moss);color:var(--moss);background:#fff;border-radius:2px;font-family:inherit;font-size:12px;cursor:pointer}
.toast{font-size:12px;color:var(--warn);min-height:16px;margin-bottom:6px;text-align:center;font-family:ui-monospace,monospace}
.cur{background:#fff;border:1px solid var(--line);border-radius:2px;padding:8px 12px;font-size:12px;color:var(--muted);margin-bottom:10px}
.cur b{color:var(--moss);font-family:ui-monospace,monospace}
.send{width:100%;padding:14px;background:var(--moss);color:var(--paper);border:none;font-family:inherit;font-size:15px;letter-spacing:.1em;cursor:pointer;border-radius:2px}
.stat{font-size:13px;padding:8px 0;min-height:18px}
.stat.ok{color:#2f5d2a}.stat.bad{color:var(--warn)}
</style>
</head>
<body>
<h1>試作03 裁切台</h1>
<div class="sub">REFRAME · 橫轉直 · 自己分段各框主體</div>
<div class="help">
金色框＝直式會留下的範圍，變暗＝會被裁掉。<br>
想自己重分段：先按「<b>全部併一段</b>」清成一整段，再到你要的點按「<b>在此切一刀</b>」，切點之前就是前一段。<br>
每段都拖金框框好主體 → 送出。
</div>

<div class="stage" id="stage">
  <video id="vid" src="https://ytlakkxrbookftluulbo.supabase.co/storage/v1/object/public/reels-publish/trial03-proxy-h.mp4" playsinline muted preload="metadata"></video>
  <div id="cropbox"></div>
</div>

<div class="bar">
  <button class="play" id="play">播放</button>
  <input type="range" id="seek" min="0" max="80.6" step="0.1" value="0">
  <span class="tval" id="tval">0.0s</span>
</div>

<div class="actrow">
  <button class="gold" id="split">在此切一刀</button>
  <button class="warn" id="merge">刪這段切點</button>
  <button id="oneseg">全部併一段</button>
</div>
<div id="toast" class="toast"></div>

<div class="seglist" id="seglist"></div>

<div class="posrow">
  <button data-p="0.0">最左</button>
  <button data-p="0.25">偏左</button>
  <button data-p="0.5">置中</button>
  <button data-p="0.75">偏右</button>
  <button data-p="1.0">最右</button>
</div>

<div class="cur" id="cur"></div>
<button class="send" id="send">送出裁切</button>
<div class="stat" id="stat"></div>

<script>
const DUR=80.6, SRCW=3840, CROPW=1215, PAN=SRCW-CROPW;
const $=id=>document.getElementById(id);
const vid=$("vid"), stage=$("stage"), box=$("cropbox");

// 起點＝Wayne 已送過的四段位置（AN-0163）；可再自行切細
let segs=[
 {a:0,  b:17,  x:0.533},
 {a:17, b:37,  x:0.46},
 {a:37, b:73,  x:0.50},
 {a:73, b:80.6,x:0.50}
];
try{const s=JSON.parse(localStorage.getItem("pov03_rf")||"null");if(s&&s.length)segs=s;}catch(_){}
let cur=0;
const fmt=t=>t.toFixed(1);

function renderSegs(){
  const L=$("seglist"); L.innerHTML="";
  segs.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="seg"+(i===cur?" on":"");
    d.innerHTML=`第${i+1}段<small>${fmt(s.a)}-${fmt(s.b)}s · ${(s.x*100).toFixed(0)}%</small>`;
    d.onclick=()=>{cur=i;vid.currentTime=(s.a+s.b)/2;renderSegs();drawBox();};
    L.appendChild(d);
  });
  if($("seglist").children[cur]) $("seglist").children[cur].scrollIntoView({inline:"center",block:"nearest"});
}
function segAt(t){for(let i=0;i<segs.length;i++)if(t>=segs[i].a&&t<segs[i].b)return i;return segs.length-1;}

let toastT=null;
function toast(msg){$("toast").textContent=msg; clearTimeout(toastT); toastT=setTimeout(()=>$("toast").textContent="",2600);}
$("split").onclick=()=>{
  const t=+vid.currentTime.toFixed(1), i=segAt(t);
  if(t<=segs[i].a+0.15){toast("已經在這段開頭了、不用切");return;}
  if(t>=segs[i].b-0.15){toast("已經在這段結尾了（下一段的開頭）");return;}
  segs.splice(i+1,0,{a:t,b:segs[i].b,x:segs[i].x});
  segs[i].b=t; cur=i; save();renderSegs();drawBox();
  toast("已在 "+t.toFixed(1)+"s 切開，之前＝第"+(i+1)+"段");
};
$("merge").onclick=()=>{
  if(segs.length<=1||cur===0){toast("第一段沒有前切點可刪");return;}
  segs[cur-1].b=segs[cur].b; segs.splice(cur,1); cur=Math.max(0,cur-1); save();renderSegs();drawBox();
  toast("已合併回上一段");
};
$("oneseg").onclick=()=>{
  const x=segs[0].x;
  segs=[{a:0,b:DUR,x:x}]; cur=0; save();renderSegs();drawBox();
  toast("已併成一整段、從這裡開始自己切");
};

function boxW(){return vid.clientHeight*9/16;}
function drawBox(){
  const w=boxW(), max=vid.clientWidth-w;
  box.style.width=w+"px";
  box.style.left=(segs[cur].x*max)+"px";
  $("cur").innerHTML=`<b>第${cur+1}段</b> ${fmt(segs[cur].a)}-${fmt(segs[cur].b)}s　裁切中心 <b>${(segs[cur].x*100).toFixed(0)}%</b>（x=${Math.round(segs[cur].x*PAN)}px）`;
}
window.addEventListener("resize",drawBox);
vid.addEventListener("loadedmetadata",()=>{$("seek").max=DUR.toFixed(1);vid.currentTime=(segs[0].a+segs[0].b)/2;drawBox();});
vid.addEventListener("timeupdate",()=>{$("seek").value=vid.currentTime;$("tval").textContent=vid.currentTime.toFixed(1)+"s";});

let drag=false;
const gx=e=>(e.touches?e.touches[0]:e).clientX;
function move(e){
  if(!drag)return;
  const r=stage.getBoundingClientRect(), w=boxW(), max=vid.clientWidth-w;
  let left=gx(e)-r.left-w/2; left=Math.max(0,Math.min(max,left));
  segs[cur].x=max>0?left/max:0.5; drawBox(); save(); e.preventDefault();
}
box.addEventListener("mousedown",e=>{drag=true;e.preventDefault();});
box.addEventListener("touchstart",e=>{drag=true;e.preventDefault();},{passive:false});
window.addEventListener("mousemove",move);
window.addEventListener("touchmove",move,{passive:false});
window.addEventListener("mouseup",()=>drag=false);
window.addEventListener("touchend",()=>drag=false);

document.querySelectorAll(".posrow button").forEach(b=>b.onclick=()=>{segs[cur].x=parseFloat(b.dataset.p);drawBox();save();});
$("play").onclick=()=>{if(vid.paused){vid.play();$("play").textContent="暫停";}else{vid.pause();$("play").textContent="播放";}};
$("seek").oninput=e=>{vid.currentTime=parseFloat(e.target.value);cur=segAt(vid.currentTime);renderSegs();drawBox();};
function save(){try{localStorage.setItem("pov03_rf",JSON.stringify(segs));}catch(_){}}

const EXEC="https://script.google.com/macros/s/AKfycbxBqNeM8AKbKVn4VIUcrAe73WRMJzH5x31e2VjhE9uSRdtmcU3i7029tR35K6vKA90B/exec";
const TK="7c7e94a5e2af4764a94cccf49c31aa0f";
$("send").onclick=async()=>{
  const st=$("stat"); st.textContent="傳送中…"; st.className="stat";
  const payload={title:"試作03 裁切位置",
    reframe:segs.map((s,i)=>({seg:i+1,start:+s.a.toFixed(1),end:+s.b.toFixed(1),
      xPct:+(s.x*100).toFixed(1),x4k:Math.round(s.x*PAN)}))};
  const body=new URLSearchParams({token:TK,payload:JSON.stringify(payload)});
  try{
    const r=await fetch(EXEC+"?action=reelsTunerSubmit",{method:"POST",body});
    let ok=false; try{ok=(await r.json()).ok;}catch(_){ok=r.ok||r.type==="opaque";}
    if(!ok)throw 0;
    st.textContent="已送達 "+segs.length+" 段 · 植影所會照這些位置重出"; st.className="stat ok";
  }catch(_){
    try{await fetch(EXEC+"?action=reelsTunerSubmit",{method:"POST",body,mode:"no-cors"});
      st.textContent="已送出 "+segs.length+" 段"; st.className="stat ok";}
    catch(e){st.textContent="傳送失敗、請截圖傳我"; st.className="stat bad";}
  }
};
renderSegs();
</script>
</body>
</html>
