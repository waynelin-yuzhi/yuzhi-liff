<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>試作02 G2 粗剪審片</title>
<style>
:root{--moss:#5F6E58;--paper:#F2EDE3;--ink:#1B1A17;--muted:#8a8275;--line:#E5E0D3}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:"Songti TC",serif;max-width:560px;margin:0 auto;padding:14px}
h1{font-size:18px;letter-spacing:.05em;margin-bottom:2px}
.sub{font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.15em;margin-bottom:12px}
.tabs{display:flex;gap:8px;margin-bottom:10px}
.tab{flex:1;padding:12px 4px;text-align:center;border:1px solid var(--moss);color:var(--moss);
     background:#fff;border-radius:2px;font-size:15px;cursor:pointer}
.tab.on{background:var(--moss);color:var(--paper)}
.tab small{display:block;font-size:11px;opacity:.8;margin-top:2px}
video{width:100%;aspect-ratio:9/16;background:#000;border-radius:2px;display:none}
video.on{display:block}
.note{font-size:12px;color:var(--muted);line-height:1.8;margin-top:12px}
</style>
</head>
<body>
<h1>試作02 POV 跳剪・G2 粗剪</h1>
<div class="sub">A/B REVIEW / 540p PROXY / 非發佈</div>
<div class="tabs">
  <div class="tab on" data-v="va">A 穩健敘事<small>32.7s・2拍為主</small></div>
  <div class="tab" data-v="vb">B 快節奏勾子<small>21.5s・1拍快閃</small></div>
</div>
<video id="va" class="on" src="https://ytlakkxrbookftluulbo.supabase.co/storage/v1/object/public/reels-publish/trial02-draft-v2.mp4" controls playsinline preload="metadata"></video>
<video id="vb" src="https://ytlakkxrbookftluulbo.supabase.co/storage/v1/object/public/reels-publish/trial02-draft-vB.mp4" controls playsinline preload="metadata"></video>
<div class="note">
兩版同曲、全對拍，差在剪法：A 照時間順序走完整趟；B 開頭先丟蘭花特寫勾子、1 拍快閃。<br>
看完回核可卡：內容欄寫「A」或「B」（或混合意見）再按核可。
</div>
<script>
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  document.querySelectorAll("video").forEach(v=>{v.classList.remove("on");v.pause();});
  t.classList.add("on");
  document.getElementById(t.dataset.v).classList.add("on");
});
</script>
</body>
</html>
