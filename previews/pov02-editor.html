<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>試作02 剪接表</title>
<style>
:root{--moss:#5F6E58;--paper:#F2EDE3;--ink:#1B1A17;--muted:#8a8275;--line:#E5E0D3;--warn:#8a4a30;--gold:#E8B14E}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:"Songti TC",serif;
     display:flex;flex-direction:column;max-width:640px;margin:0 auto}
header{padding:8px 12px 4px;display:flex;align-items:baseline;gap:8px}
h1{font-size:15px}
.sub{font-size:10px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.1em}
.top{flex:0 0 auto;padding:0 12px;display:flex;gap:10px}
.vwrap2{position:relative;width:36%;max-width:160px;flex:0 0 auto}
.vwrap2 video{width:100%}
#photoLayer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
#photoLayer.on{display:block}
#endLayer{position:absolute;inset:0;background:#000;display:none;align-items:center;justify-content:center}
#endLayer.on{display:flex}
#endLayer img{width:65%}
#capov{position:absolute;inset:0;pointer-events:none}
#capov .cl{position:absolute;left:0;right:0;text-align:center;transform:translateY(-50%);color:#fff;font-size:9px;line-height:1.3;letter-spacing:.04em;text-shadow:0 1px 3px rgba(0,0,0,.95),0 2px 8px rgba(0,0,0,.8)}
video{width:36%;max-width:160px;aspect-ratio:9/16;background:#000;border-radius:2px}
.side{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.info{font-family:ui-monospace,monospace;font-size:12px;color:var(--moss);min-height:16px}
.rowbtn{display:flex;gap:5px}
.rowbtn button{flex:1;padding:9px 2px;border:1px solid var(--moss);color:var(--moss);background:#fff;
  border-radius:2px;font-size:13px;font-family:inherit;cursor:pointer;min-width:0}
.rowbtn button.warn{border-color:var(--warn);color:var(--warn)}
.rowbtn button:disabled{border-color:var(--line);color:var(--line)}
.play2{display:flex;gap:5px}
.play2 button{flex:1;padding:10px 2px;border:none;background:var(--moss);color:var(--paper);
  border-radius:2px;font-size:13px;font-family:inherit;cursor:pointer}
.play2 .send{background:#8a6d3b}
.stat{font-size:12px;min-height:15px}
.stat.ok{color:#2f5d2a}.stat.bad{color:var(--warn)}
#capbox{flex:0 0 auto;background:#fff;border-top:1px solid var(--line);max-height:34vh;overflow-y:auto}
#capbox summary{padding:9px 12px;font-size:13px;color:var(--moss);cursor:pointer;position:sticky;top:0;background:#fff}
.caphead{padding:6px 12px;font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;border-top:1px solid var(--line)}
.addcap{width:100%;padding:9px;border:1px dashed var(--moss);color:var(--moss);background:#fff;border-radius:2px;font-family:inherit;font-size:13px;cursor:pointer}
.capwrap{border-top:1px solid var(--line);padding:6px 12px}
.capwrap.warn{background:#fdf3ef}
.captime{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);padding-top:3px}
.captime b{color:var(--moss)}
.captime .w{color:var(--warn)}
.capdel{color:var(--warn);background:none;border:none;font-size:15px;cursor:pointer;padding:0 4px}
.caprow{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--line);font-size:12px}
.caprow .tx{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.caprow select,.caprow input{font-family:inherit;font-size:12px;padding:4px;border:1px solid var(--line);border-radius:2px;background:#fff}
.caprow select{max-width:96px}
.caprow input[type=number]{width:52px}
.caprow .tm{font-family:ui-monospace,monospace;color:var(--muted);min-width:42px;text-align:right}
.stripzone{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0;
  border-top:1px solid var(--line);background:#EAE4D6}
.hintline{text-align:center;font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;padding:6px 0 2px}
#strip{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 16px;gap:8px}
.card{flex:0 0 auto;width:112px;background:#fff;border:2px solid var(--line);border-radius:4px;
  overflow:hidden;position:relative;transition:transform .12s}
.card.on{border-color:var(--moss);box-shadow:0 2px 8px rgba(0,0,0,.18)}
.card.dragging{opacity:.65;transform:scale(1.06);z-index:5}
.thumb{width:112px;background-repeat:no-repeat;pointer-events:none}
.meta{padding:4px 6px;pointer-events:none}
.meta .nm{font-size:12px}
.meta .tm{font-family:ui-monospace,monospace;font-size:10px;color:var(--muted)}
.ord{position:absolute;top:3px;left:3px;background:var(--moss);color:#fff;font-size:11px;
  font-family:ui-monospace,monospace;padding:1px 6px;border-radius:2px;pointer-events:none}
</style>
</head>
<body>
<header><h1>試作02 剪接表</h1><span class="sub">EDIT DECISION LIST・按住卡片左右拖＝換順序</span></header>
<div class="top">
  <div class="vwrap2">
    <video id="vid" src="https://ytlakkxrbookftluulbo.supabase.co/storage/v1/object/public/reels-publish/pov02-proxy.mp4"
           playsinline preload="metadata" muted></video>
    <img id="photoLayer" src="pov02/payoff.jpg" alt="">
    <div id="endLayer"><img src="pov02/endcard.png" alt=""></div>
    <div id="capov"></div>
  </div>
  <div class="side">
    <div class="info" id="info">點一張卡片開始</div>
    <div class="rowbtn">
      <button id="mvL">← 移前</button><button id="mvR">移後 →</button>
      <button id="del" class="warn">刪這刀</button>
    </div>
    <div class="rowbtn">
      <button id="stL">開始 −0.5s</button><button id="stR">開始 +0.5s</button>
    </div>
    <div class="rowbtn">
      <button id="duL">短 1 拍</button><button id="duR">長 1 拍</button>
    </div>
    <div class="play2">
      <button id="playall">從頭試看整段</button>
      <button id="send" class="send">送出剪接表</button>
    </div>
    <div class="stat" id="stat"></div>
  </div>
</div>
<details id="capbox">
  <summary>字幕（綁在刀上、改剪接表會自動跟著跑）</summary>
  <div class="caphead">文字　｜　跟哪一刀　｜　延遲出現　｜　顯示多久（綁「成果照」的句子不在播放器預覽）</div>
  <div id="caplist"></div>
  <div style="padding:8px 12px"><button id="addcap" class="addcap">＋ 加一句字幕</button></div>
</details>
<div class="stripzone">
  <div class="hintline">共 <span id="cnt"></span> 刀・總長 <span id="tot"></span> 秒</div>
  <div id="strip"></div>
</div>
<script>
const BEAT=0.7430, STEP=2, COLS=8, ROWS=8, TW=112, DUR=453;
const PHOTO_LEN=3.0, TAIL_LEN=2.4, FPS=30;   // 成片結構：本體 + 成果照 + 片尾黑幕
const SCRIM_AT=1.5;                          // 片尾黑幕在照片段的第幾秒開始淡入
const SHEETS=["pov02/sheet01.jpg","pov02/sheet02.jpg","pov02/sheet03.jpg","pov02/sheet04.jpg"];
const $=id=>document.getElementById(id);
const vid=$("vid"), strip=$("strip");
// 預設＝Wayne 最後送出的排刀（AN-0112）；頁面改動自動存手機、重開不丟
let shots=[
 {nm:"整裝",st:1.5,nb:2},{nm:"推車",st:6,nb:2},{nm:"按電梯",st:27,nb:2},
 {nm:"進梯",st:43.5,nb:2},{nm:"鍵盤",st:53.5,nb:2},{nm:"出梯",st:77,nb:4},
 {nm:"走廊",st:84,nb:2},{nm:"捧花走",st:156,nb:2},{nm:"擺花2",st:163.5,nb:2},
 {nm:"收花2",st:321,nb:2},{nm:"收花",st:134,nb:2},{nm:"大盆搬",st:185.5,nb:2},
 {nm:"大盆擺",st:195.5,nb:2},{nm:"擺花",st:145.5,nb:3},{nm:"拍照結尾",st:243.5,nb:4}
];
try{ const sv=JSON.parse(localStorage.getItem("pov02_shots")||"null"); if(sv&&sv.length) shots=sv; }catch(_){}
let cur=-1, thumbH=0, seqTimer=null;

// 字幕：綁刀號（1-based）＋偏移秒＋停留秒；排刀一動、字幕自動跟著移
let caps=[
 {tx:"POV: 你請的植物保姆今天來換迎賓花", shot:1, off:0.5, du:3.0, pos:"上方"},
 {tx:"新的一批上樓，準備接班",        shot:3, off:0.2, du:2.4, pos:"中下"},
 {tx:"一盆一盆，各就各位",            shot:9, off:0.2, du:2.4, pos:"中下"},
 {tx:"接下來就交給你們了",            shot:13,off:0.1, du:1.35,pos:"中下"},
 {tx:"好好迎接每一位貴賓",            shot:14,off:0.2, du:1.95,pos:"中下"},
 {tx:"拍張照，記錄今天的狀態",         shot:15,off:0.1, du:1.3, pos:"中下"},
 {tx:"我們下個月見",                 shot:0, off:0.5, du:2.0, pos:"照片"}
];
try{ const sc=JSON.parse(localStorage.getItem("pov02_caps")||"null"); if(sc&&sc.length) caps=sc; }catch(_){}

function shotStart(i){ // 第 i 刀（1-based）起點；用「累積拍點×fps 取整」與出片演算法一致
  let acc=0;
  for(let k=0;k<i-1&&k<shots.length;k++) acc+=shots[k].nb;
  return Math.round(acc*BEAT*FPS)/FPS;
}
function bodyLen(){ return Math.round(shots.reduce((a,s)=>a+s.nb,0)*BEAT*FPS)/FPS; }
function totalLen(){ return bodyLen()+PHOTO_LEN+TAIL_LEN; }
function capTime(c){ return c.shot===0 ? bodyLen()+c.off : shotStart(c.shot)+c.off; }

function capEnd(c){ return capTime(c)+c.du; }
function paintCaps(){
  const box=$("caplist"); box.innerHTML="";
  caps.forEach((c,i)=>{
    const w=document.createElement("div"); w.className="capwrap";
    const opts=shots.map((s,k)=>`<option value="${k+1}" ${c.shot===k+1?"selected":""}>${k+1}. ${s.nm}</option>`).join("")
      +`<option value="0" ${c.shot===0?"selected":""}>成果照</option>`;
    const st=capTime(c), en=capEnd(c);
    // 同刀重疊偵測
    const clash=caps.some((o,j)=>j!==i && capTime(o)<en && capEnd(o)>st && o.pos===c.pos);
    const nearby=caps.some((o,j)=>j!==i && capTime(o)<en && capEnd(o)>st && o.pos!==c.pos);
    if(clash) w.classList.add("warn");
    // 超出該刀長度提醒
    const lim = c.shot===0 ? 3.0 : shots[c.shot-1].nb*BEAT;
    const over = (c.off + c.du) > lim + 0.35;
    w.innerHTML=`<div class="caprow">
        <input type="text" class="ct" data-i="${i}" value="${c.tx.replace(/"/g,'&quot;')}">
        <button class="capdel" data-i="${i}">✕</button>
      </div>
      <div class="caprow">
        <select class="cs" data-i="${i}">${opts}</select>
        <input type="number" class="co" data-i="${i}" value="${c.off}" step="0.1" min="-1" max="6">
        <input type="number" class="cd" data-i="${i}" value="${c.du}" step="0.1" min="0.6" max="6">
        <select class="cp" data-i="${i}">
          <option ${c.pos==="中下"?"selected":""}>中下</option>
          <option ${c.pos==="上方"?"selected":""}>上方</option>
          <option ${c.pos==="中央"?"selected":""}>中央</option>
          <option ${c.pos==="照片"?"selected":""}>照片</option>
        </select>
      </div>
      <div class="captime">出現 <b>${st.toFixed(1)}s</b> → 消失 <b>${en.toFixed(1)}s</b>・清楚 <b>${
        Math.max(0,c.du-2*Math.min(0.4,c.du/3)).toFixed(1)}s</b>${
        (()=>{const solid=Math.max(0,c.du-2*Math.min(0.4,c.du/3));
              const cn=c.tx.split("|")[0].replace(/[^\u4e00-\u9fa5]/g,"").length;
              return solid>0 && cn/solid>7 ? `<span class="w">・${(cn/solid).toFixed(0)}字/秒 太快讀不完</span>` : "";})()}
        ${clash?'<span class="w">・和另一句在同位置重疊</span>':''}
        ${nearby?'<span style="color:#8a8275">・同時另一句在別的位置</span>':''}
        ${over?'<span class="w">・超出這一刀的長度</span>':''}</div>`;
    box.appendChild(w);
  });
  const bind=(cls,fn)=>box.querySelectorAll(cls).forEach(el=>el.onchange=e=>{fn(caps[+e.target.dataset.i],e.target.value); saveCaps(); paintCaps();});
  bind(".ct",(c,v)=>c.tx=v);
  bind(".cs",(c,v)=>c.shot=+v);
  bind(".co",(c,v)=>c.off=+v);
  bind(".cd",(c,v)=>c.du=+v);
  bind(".cp",(c,v)=>c.pos=v);
  if(typeof paintCapOverlay==="function") setTimeout(paintCapOverlay,50);
  box.querySelectorAll(".capdel").forEach(el=>el.onclick=e=>{
    caps.splice(+e.target.dataset.i,1); saveCaps(); paintCaps(); });
}
function saveCaps(){ try{ localStorage.setItem("pov02_caps",JSON.stringify(caps)); }catch(_){} }
// 一刀放兩句＝同刀號、第二句延遲拉到第一句之後
document.addEventListener("click",e=>{
  if(e.target.id!=="addcap") return;
  const base = cur>=0 ? cur+1 : 1;
  const same = caps.filter(c=>c.shot===base);
  const off = same.length ? Math.max(...same.map(c=>c.off+c.du))+0.1 : 0.2;
  caps.push({tx:"新字幕", shot:base, off:+off.toFixed(1), du:1.2, pos:"中下"});
  saveCaps(); paintCaps();
});

const probe=new Image();
probe.onload=()=>{ thumbH=Math.round(TW*(probe.naturalHeight/ROWS)/(probe.naturalWidth/COLS)); paint(); };
probe.src=SHEETS[0];

function thumbCss(t){
  const i=Math.min(Math.floor(t/STEP), Math.floor(DUR/STEP));
  const s=Math.floor(i/(COLS*ROWS)), rem=i%(COLS*ROWS);
  const row=Math.floor(rem/COLS), col=rem%COLS;
  return {img:SHEETS[s], x:-col*TW, y:-row*thumbH};
}
function paint(){
  strip.innerHTML="";
  shots.forEach((sh,i)=>{
    const c=document.createElement("div"); c.className="card"+(i===cur?" on":"");
    const th=thumbCss(sh.st+0.3);
    c.innerHTML=`<span class="ord">${i+1}</span>
      <div class="thumb" style="height:${thumbH}px;background-image:url(${th.img});
        background-size:${TW*COLS}px ${thumbH*ROWS}px;background-position:${th.x}px ${th.y}px"></div>
      <div class="meta"><div class="nm">${sh.nm}</div>
      <div class="tm">${sh.st.toFixed(1)}s起・${(sh.nb*BEAT).toFixed(1)}s</div></div>`;
    c.onclick=()=>selectShot(i,true);
    attachDrag(c,i);
    strip.appendChild(c);
  });
  try{ localStorage.setItem("pov02_shots",JSON.stringify(shots)); }catch(_){}
  if(typeof paintCaps==="function") paintCaps();
  $("cnt").textContent=shots.length;
  $("tot").textContent=`${bodyLen().toFixed(1)}（＋照片 ${PHOTO_LEN} ＋片尾 ${TAIL_LEN} ＝成片 ${totalLen().toFixed(1)}）`;
  if(cur>=0&&cur<shots.length){
    const s=shots[cur];
    $("info").textContent=`#${cur+1} ${s.nm}・${s.st.toFixed(1)}s 起・${s.nb} 拍（${(s.nb*BEAT).toFixed(1)}s）`;
  } else $("info").textContent="點一張卡片開始";
}
function stopSeq(){ if(seqTimer){clearInterval(seqTimer);seqTimer=null;} vid.pause();
  const pl=$("photoLayer"), el=$("endLayer");
  if(pl){ pl.classList.remove("on"); pl.style.opacity="1"; }
  if(el) el.classList.remove("on");
  $("playall").textContent="從頭試看整段"; }
function selectShot(i,preview){
  stopSeq(); cur=i; paint();
  if(preview){ playRange(shots[i].st, shots[i].st+shots[i].nb*BEAT); }
  setTimeout(paintCapOverlay,120);
}
const POSY={"上方":21,"中央":50,"中下":71,"照片":64};
function timelineNow(){
  // 目前播的是第 cur 刀 → 換算成成片時間
  if(cur<0||cur>=shots.length) return -1;
  const s=shots[cur];
  const inShot=vid.currentTime-s.st;
  if(inShot<-0.2||inShot>s.nb*BEAT+0.2) return -1;
  return shotStart(cur+1)+Math.max(0,inShot);
}
const CFADE=0.4;
function capFade(c){ return Math.min(CFADE, c.du/3); }   // 與出片端同演算法
function capAlpha(c,t){
  const st=capTime(c), f=capFade(c), en=st+c.du;
  if(t<st||t>en) return 0;
  if(t<st+f) return (t-st)/f;
  if(t>en-f) return (en-t)/f;
  return 1;
}
function paintCapOverlay(){
  const ov=$("capov"); if(!ov) return;
  const t=timelineNow();
  if(t<0){ ov.innerHTML=""; return; }
  const hits=caps.filter(c=>c.shot!==0 && t>=capTime(c) && t<=capTime(c)+c.du);
  ov.innerHTML=hits.map(h=>`<div class="cl" style="top:${POSY[h.pos]||71}%;opacity:${
    capAlpha(h,t).toFixed(2)}">${h.tx.split("|")[0].replace(/</g,"&lt;")}</div>`).join("");
}
vid.addEventListener("timeupdate",paintCapOverlay);
vid.addEventListener("seeked",paintCapOverlay);
// 持續刷新：暫停/逐格拖曳時也要跟著變（timeupdate 只在播放時觸發）
(function loop(){ paintCapOverlay(); requestAnimationFrame(loop); })();

function playRange(a,b){
  vid.currentTime=a; vid.play();
  const h=()=>{ if(vid.currentTime>=b){ vid.pause(); vid.removeEventListener("timeupdate",h); } };
  vid.addEventListener("timeupdate",h);
}
// 順序/起點/長度
$("mvL").onclick=()=>{ if(cur>0){ [shots[cur-1],shots[cur]]=[shots[cur],shots[cur-1]]; cur--; paint(); } };
$("mvR").onclick=()=>{ if(cur>=0&&cur<shots.length-1){ [shots[cur+1],shots[cur]]=[shots[cur],shots[cur+1]]; cur++; paint(); } };
$("del").onclick=()=>{ if(cur>=0){ shots.splice(cur,1); cur=-1; paint(); } };
$("stL").onclick=()=>{ if(cur>=0){ shots[cur].st=Math.max(0,+(shots[cur].st-0.5).toFixed(1)); selectShot(cur,true); } };
$("stR").onclick=()=>{ if(cur>=0){ shots[cur].st=Math.min(DUR-1,+(shots[cur].st+0.5).toFixed(1)); selectShot(cur,true); } };
$("duL").onclick=()=>{ if(cur>=0&&shots[cur].nb>1){ shots[cur].nb--; selectShot(cur,true); } };
$("duR").onclick=()=>{ if(cur>=0&&shots[cur].nb<6){ shots[cur].nb++; selectShot(cur,true); } };

// 按住拖曳換順序（250ms 長按啟動、與點擊/捲動共存）
function attachDrag(card,idx){
  let timer=null, dragging=false, sx=0;
  card.addEventListener("pointerdown",e=>{
    sx=e.clientX;
    timer=setTimeout(()=>{ dragging=true; card.classList.add("dragging");
      card.setPointerCapture(e.pointerId); },250);
  });
  card.addEventListener("pointermove",e=>{
    if(!dragging){ if(Math.abs(e.clientX-sx)>8&&timer){clearTimeout(timer);timer=null;} return; }
    e.preventDefault();
    const cards=[...strip.children];
    const i=cards.indexOf(card);
    const prev=cards[i-1], next=cards[i+1];
    if(prev && e.clientX < prev.getBoundingClientRect().left+prev.offsetWidth/2){
      [shots[i-1],shots[i]]=[shots[i],shots[i-1]]; if(cur===i)cur=i-1; else if(cur===i-1)cur=i;
      strip.insertBefore(card,prev); refreshOrd();
    } else if(next && e.clientX > next.getBoundingClientRect().left+next.offsetWidth/2){
      [shots[i+1],shots[i]]=[shots[i],shots[i+1]]; if(cur===i)cur=i+1; else if(cur===i+1)cur=i;
      strip.insertBefore(next,card); refreshOrd();
    }
  });
  const end=()=>{ clearTimeout(timer); timer=null;
    if(dragging){ dragging=false; card.classList.remove("dragging"); paint(); } };
  card.addEventListener("pointerup",end);
  card.addEventListener("pointercancel",end);
}
function refreshOrd(){ [...strip.children].forEach((c,i)=>{ const o=c.querySelector(".ord"); if(o) o.textContent=i+1; }); }

// 從頭試看：照目前排刀順序逐刀跳播（近似成品、無轉場）
function showLayer(mode){
  $("photoLayer").classList.toggle("on",mode==="photo");
  $("endLayer").classList.toggle("on",mode==="end");
}
$("playall").onclick=()=>{
  if(seqTimer){ stopSeq(); showLayer(""); return; }
  let i=0;
  $("playall").textContent="停止試看"; showLayer("");
  const step=()=>{ if(i>=shots.length){ stopSeq(); return; }
    cur=i; paint();
    vid.currentTime=shots[i].st; vid.play(); };
  step();
  let phase="body", tEnd=0;
  seqTimer=setInterval(()=>{
    if(phase==="body"){
      if(i<shots.length && vid.currentTime>=shots[i].st+shots[i].nb*BEAT-0.03){
        i++;
        if(i>=shots.length){ // 本體播完 → 成果照
          vid.pause(); phase="photo"; showLayer("photo"); tEnd=Date.now()+PHOTO_LEN*1000;
          cur=-1; paint(); return;
        }
        vid.currentTime=shots[i].st; cur=i; paint();
      }
    } else if(phase==="photo"){
      const left=(tEnd-Date.now())/1000;
      // 照片段字幕（綁「成果照」那幾句）
      const el=PHOTO_LEN-left;
      const hits=caps.filter(c=>c.shot===0 && el>=c.off && el<=c.off+c.du);
      $("capov").innerHTML=hits.map(h=>`<div class="cl" style="top:${POSY[h.pos]||64}%">${h.tx.split("|")[0]}</div>`).join("");
      if(el>=SCRIM_AT) $("photoLayer").style.opacity=String(Math.max(0,1-(el-SCRIM_AT)/(PHOTO_LEN-SCRIM_AT)));
      if(left<=0){ phase="end"; $("photoLayer").style.opacity="1"; showLayer("end"); $("capov").innerHTML=""; tEnd=Date.now()+TAIL_LEN*1000; }
    } else {
      if(Date.now()>=tEnd){ stopSeq(); showLayer(""); paint(); }
    }
  },60);
};

const EXEC="https://script.google.com/macros/s/AKfycbxBqNeM8AKbKVn4VIUcrAe73WRMJzH5x31e2VjhE9uSRdtmcU3i7029tR35K6vKA90B/exec";
const SUBMIT_TOKEN="7c7e94a5e2af4764a94cccf49c31aa0f";
$("send").onclick=async()=>{
  stopSeq();
  const st=$("stat");
  const payload={title:"試作02 剪接表",
    shots:shots.map(s=>({name:s.nm,start:+s.st.toFixed(1),beats:s.nb})),
    captions:caps.map(c=>({text:c.tx,shot:c.shot,offset:c.off,duration:c.du,pos:c.pos,
                           at:+capTime(c).toFixed(2)}))};
  st.textContent="傳送中…"; st.className="stat";
  const body=new URLSearchParams({token:SUBMIT_TOKEN,payload:JSON.stringify(payload)});
  try{
    // GAS 會 302 轉址；fetch 預設跟隨，但 CORS 下讀不到回應 → 用 no-cors 送、成功與否看有沒有丟例外
    const r=await fetch(EXEC+"?action=reelsTunerSubmit",{method:"POST",body});
    let ok=false;
    try{ const d=await r.json(); ok=!!d.ok; }catch(_){ ok=r.ok||r.type==="opaque"; }
    if(!ok) throw 0;
    st.textContent="已送達（"+shots.length+" 刀 / "+caps.length+" 句字幕）"; st.className="stat ok";
  }catch(_){
    // 退路：no-cors 再送一次（不會有回應但送得出去），避免誤報失敗
    try{
      await fetch(EXEC+"?action=reelsTunerSubmit",{method:"POST",body,mode:"no-cors"});
      st.textContent="已送出（"+shots.length+" 刀 / "+caps.length+" 句字幕）"; st.className="stat ok";
    }catch(e){
      st.textContent="傳送失敗、請截圖傳我"; st.className="stat bad";
    }
  }
};
</script>
