<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>試作02 排刀台</title>
<style>
:root{--moss:#5F6E58;--paper:#F2EDE3;--ink:#1B1A17;--muted:#8a8275;--line:#E5E0D3;--warn:#8a4a30;--gold:#E8B14E}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:"Songti TC",serif;
     display:flex;flex-direction:column;max-width:640px;margin:0 auto}
header{padding:8px 12px 4px;display:flex;align-items:baseline;gap:8px}
h1{font-size:15px}
.sub{font-size:10px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.1em}
.top{flex:0 0 auto;padding:0 12px;display:flex;gap:10px}
video{width:36%;max-width:160px;aspect-ratio:9/16;background:#000;border-radius:2px}
.side{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.info{font-family:ui-monospace,monospace;font-size:12px;color:var(--moss);min-height:16px}
.rowbtn{display:flex;gap:5px}
.rowbtn button{flex:1;padding:9px 2px;border:1px solid var(--moss);color:var(--moss);background:#fff;
  border-radius:2px;font-size:13px;font-family:inherit;cursor:pointer;min-width:0}
.rowbtn button.warn{border-color:var(--warn);color:var(--warn)}
.rowbtn button:disabled{border-color:var(--line);color:var(--line)}
.play2{display:flex;gap:5px}
.play2 button{flex:1;padding:10px 2px;border:none;background:var(--moss);color:var(--paper);
  border-radius:2px;font-size:13px;font-family:inherit;cursor:pointer}
.play2 .send{background:#8a6d3b}
.stat{font-size:12px;min-height:15px}
.stat.ok{color:#2f5d2a}.stat.bad{color:var(--warn)}
.stripzone{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0;
  border-top:1px solid var(--line);background:#EAE4D6}
.hintline{text-align:center;font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;padding:6px 0 2px}
#strip{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 16px;gap:8px}
.card{flex:0 0 auto;width:112px;background:#fff;border:2px solid var(--line);border-radius:4px;
  overflow:hidden;position:relative;transition:transform .12s}
.card.on{border-color:var(--moss);box-shadow:0 2px 8px rgba(0,0,0,.18)}
.card.dragging{opacity:.65;transform:scale(1.06);z-index:5}
.thumb{width:112px;background-repeat:no-repeat;pointer-events:none}
.meta{padding:4px 6px;pointer-events:none}
.meta .nm{font-size:12px}
.meta .tm{font-family:ui-monospace,monospace;font-size:10px;color:var(--muted)}
.ord{position:absolute;top:3px;left:3px;background:var(--moss);color:#fff;font-size:11px;
  font-family:ui-monospace,monospace;padding:1px 6px;border-radius:2px;pointer-events:none}
</style>
</head>
<body>
<header><h1>試作02 排刀台</h1><span class="sub">按住卡片左右拖＝換順序・點卡片＝試看那刀</span></header>
<div class="top">
  <video id="vid" src="https://ytlakkxrbookftluulbo.supabase.co/storage/v1/object/public/reels-publish/pov02-proxy.mp4"
         playsinline preload="metadata" muted></video>
  <div class="side">
    <div class="info" id="info">點一張卡片開始</div>
    <div class="rowbtn">
      <button id="mvL">← 移前</button><button id="mvR">移後 →</button>
      <button id="del" class="warn">刪這刀</button>
    </div>
    <div class="rowbtn">
      <button id="stL">開始 −0.5s</button><button id="stR">開始 +0.5s</button>
    </div>
    <div class="rowbtn">
      <button id="duL">短 1 拍</button><button id="duR">長 1 拍</button>
    </div>
    <div class="play2">
      <button id="playall">從頭試看整段</button>
      <button id="send" class="send">送出排刀</button>
    </div>
    <div class="stat" id="stat"></div>
  </div>
</div>
<div class="stripzone">
  <div class="hintline">共 <span id="cnt"></span> 刀・總長 <span id="tot"></span> 秒</div>
  <div id="strip"></div>
</div>
<script>
const BEAT=0.7430, STEP=2, COLS=8, ROWS=8, TW=112, DUR=453;
const SHEETS=["pov02/sheet01.jpg","pov02/sheet02.jpg","pov02/sheet03.jpg","pov02/sheet04.jpg"];
const $=id=>document.getElementById(id);
const vid=$("vid"), strip=$("strip");
let shots=[
 {nm:"整裝",st:1.0,nb:2},{nm:"推車",st:6.0,nb:1},{nm:"按電梯",st:33.5,nb:1},
 {nm:"進梯",st:44.0,nb:1},{nm:"鍵盤",st:54.0,nb:1},{nm:"出梯",st:76.5,nb:1},
 {nm:"走廊",st:84.0,nb:2},{nm:"收花",st:134.0,nb:2},{nm:"收花2",st:298.0,nb:2},
 {nm:"捧花走",st:156.0,nb:2},{nm:"擺花",st:148.0,nb:2},{nm:"擺花2",st:162.0,nb:2},
 {nm:"大盆搬",st:184.0,nb:2},{nm:"大盆擺",st:196.0,nb:2},{nm:"拍照結尾",st:244.0,nb:3}
];
let cur=-1, thumbH=0, seqTimer=null;

const probe=new Image();
probe.onload=()=>{ thumbH=Math.round(TW*(probe.naturalHeight/ROWS)/(probe.naturalWidth/COLS)); paint(); };
probe.src=SHEETS[0];

function thumbCss(t){
  const i=Math.min(Math.floor(t/STEP), Math.floor(DUR/STEP));
  const s=Math.floor(i/(COLS*ROWS)), rem=i%(COLS*ROWS);
  const row=Math.floor(rem/COLS), col=rem%COLS;
  return {img:SHEETS[s], x:-col*TW, y:-row*thumbH};
}
function paint(){
  strip.innerHTML="";
  shots.forEach((sh,i)=>{
    const c=document.createElement("div"); c.className="card"+(i===cur?" on":"");
    const th=thumbCss(sh.st+0.3);
    c.innerHTML=`<span class="ord">${i+1}</span>
      <div class="thumb" style="height:${thumbH}px;background-image:url(${th.img});
        background-size:${TW*COLS}px ${thumbH*ROWS}px;background-position:${th.x}px ${th.y}px"></div>
      <div class="meta"><div class="nm">${sh.nm}</div>
      <div class="tm">${sh.st.toFixed(1)}s起・${(sh.nb*BEAT).toFixed(1)}s</div></div>`;
    c.onclick=()=>selectShot(i,true);
    attachDrag(c,i);
    strip.appendChild(c);
  });
  $("cnt").textContent=shots.length;
  $("tot").textContent=(shots.reduce((a,s)=>a+s.nb,0)*BEAT).toFixed(1);
  if(cur>=0&&cur<shots.length){
    const s=shots[cur];
    $("info").textContent=`#${cur+1} ${s.nm}・${s.st.toFixed(1)}s 起・${s.nb} 拍（${(s.nb*BEAT).toFixed(1)}s）`;
  } else $("info").textContent="點一張卡片開始";
}
function stopSeq(){ if(seqTimer){clearInterval(seqTimer);seqTimer=null;} vid.pause(); $("playall").textContent="從頭試看整段"; }
function selectShot(i,preview){
  stopSeq(); cur=i; paint();
  if(preview){ playRange(shots[i].st, shots[i].st+shots[i].nb*BEAT); }
}
function playRange(a,b){
  vid.currentTime=a; vid.play();
  const h=()=>{ if(vid.currentTime>=b){ vid.pause(); vid.removeEventListener("timeupdate",h); } };
  vid.addEventListener("timeupdate",h);
}
// 順序/起點/長度
$("mvL").onclick=()=>{ if(cur>0){ [shots[cur-1],shots[cur]]=[shots[cur],shots[cur-1]]; cur--; paint(); } };
$("mvR").onclick=()=>{ if(cur>=0&&cur<shots.length-1){ [shots[cur+1],shots[cur]]=[shots[cur],shots[cur+1]]; cur++; paint(); } };
$("del").onclick=()=>{ if(cur>=0){ shots.splice(cur,1); cur=-1; paint(); } };
$("stL").onclick=()=>{ if(cur>=0){ shots[cur].st=Math.max(0,+(shots[cur].st-0.5).toFixed(1)); selectShot(cur,true); } };
$("stR").onclick=()=>{ if(cur>=0){ shots[cur].st=Math.min(DUR-1,+(shots[cur].st+0.5).toFixed(1)); selectShot(cur,true); } };
$("duL").onclick=()=>{ if(cur>=0&&shots[cur].nb>1){ shots[cur].nb--; selectShot(cur,true); } };
$("duR").onclick=()=>{ if(cur>=0&&shots[cur].nb<6){ shots[cur].nb++; selectShot(cur,true); } };

// 按住拖曳換順序（250ms 長按啟動、與點擊/捲動共存）
function attachDrag(card,idx){
  let timer=null, dragging=false, sx=0;
  card.addEventListener("pointerdown",e=>{
    sx=e.clientX;
    timer=setTimeout(()=>{ dragging=true; card.classList.add("dragging");
      card.setPointerCapture(e.pointerId); },250);
  });
  card.addEventListener("pointermove",e=>{
    if(!dragging){ if(Math.abs(e.clientX-sx)>8&&timer){clearTimeout(timer);timer=null;} return; }
    e.preventDefault();
    const cards=[...strip.children];
    const i=cards.indexOf(card);
    const prev=cards[i-1], next=cards[i+1];
    if(prev && e.clientX < prev.getBoundingClientRect().left+prev.offsetWidth/2){
      [shots[i-1],shots[i]]=[shots[i],shots[i-1]]; if(cur===i)cur=i-1; else if(cur===i-1)cur=i;
      strip.insertBefore(card,prev); refreshOrd();
    } else if(next && e.clientX > next.getBoundingClientRect().left+next.offsetWidth/2){
      [shots[i+1],shots[i]]=[shots[i],shots[i+1]]; if(cur===i)cur=i+1; else if(cur===i+1)cur=i;
      strip.insertBefore(next,card); refreshOrd();
    }
  });
  const end=()=>{ clearTimeout(timer); timer=null;
    if(dragging){ dragging=false; card.classList.remove("dragging"); paint(); } };
  card.addEventListener("pointerup",end);
  card.addEventListener("pointercancel",end);
}
function refreshOrd(){ [...strip.children].forEach((c,i)=>{ const o=c.querySelector(".ord"); if(o) o.textContent=i+1; }); }

// 從頭試看：照目前排刀順序逐刀跳播（近似成品、無轉場）
$("playall").onclick=()=>{
  if(seqTimer){ stopSeq(); return; }
  let i=0;
  $("playall").textContent="停止試看";
  const step=()=>{ if(i>=shots.length){ stopSeq(); return; }
    cur=i; paint();
    vid.currentTime=shots[i].st; vid.play(); };
  step();
  seqTimer=setInterval(()=>{
    if(i<shots.length && vid.currentTime>=shots[i].st+shots[i].nb*BEAT-0.03){ i++; if(i>=shots.length){ stopSeq(); paint(); return; } vid.currentTime=shots[i].st; cur=i; paint(); }
  },60);
};

const EXEC="https://script.google.com/macros/s/AKfycbxBqNeM8AKbKVn4VIUcrAe73WRMJzH5x31e2VjhE9uSRdtmcU3i7029tR35K6vKA90B/exec";
const SUBMIT_TOKEN="7c7e94a5e2af4764a94cccf49c31aa0f";
$("send").onclick=async()=>{
  stopSeq();
  const st=$("stat");
  const payload={title:"試作02 排刀指令",
    shots:shots.map(s=>({name:s.nm,start:+s.st.toFixed(1),beats:s.nb}))};
  try{
    const r=await fetch(EXEC+"?action=reelsTunerSubmit",{method:"POST",
      body:new URLSearchParams({token:SUBMIT_TOKEN,payload:JSON.stringify(payload)})});
    const d=await r.json();
    if(!d.ok) throw 0;
    st.textContent="已送達（"+shots.length+" 刀）、照這份出片"; st.className="stat ok";
  }catch(_){ st.textContent="傳送失敗、請截圖傳我"; st.className="stat bad"; }
};
</script>
</body>
</html>
